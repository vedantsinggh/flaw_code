name: ForgeOS CI/CD Pipeline

on:
  push:
    branches: [ main, dev, 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  backend-validation:
    name: Backend Validation (Python)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-cov bandit
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Run Ruff (Linter)
      run: ruff check backend/

    - name: Run Bandit (Security Scan)
      run: bandit -r backend/ -ll

    - name: Run Pytest (Unit Tests)
      run: |
        export PYTHONPATH=backend
        pytest --cov=backend/app --cov-report=xml

  frontend-validation:
    name: Frontend Validation (Node.js)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: |
        cd frontend
        npm ci || npm install

    - name: Verify Build (TypeScript & Vite compile)
      run: |
        cd frontend
        npm run build

  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-validation, frontend-validation]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Verify Docker Compose config
      run: docker compose config

    - name: Build Backend Container Image
      run: docker build -t forgeos-backend:test ./backend

    - name: Build Frontend Container Image
      run: docker build -t forgeos-frontend:test ./frontend
